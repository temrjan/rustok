# cargo-deny configuration for Rustok
# Run: cargo deny check

[graph]
all-features = true

[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste — transitive dep via revm" },
    # Tauri transitive deps: GTK/GLib/ATK bindings marked "unmaintained".
    # Not security vulnerabilities. Tauri team aware.
    { id = "RUSTSEC-2024-0370", reason = "Tauri transitive dep (proc-macro-error)" },
    { id = "RUSTSEC-2024-0411", reason = "Tauri transitive dep (gio)" },
    { id = "RUSTSEC-2024-0412", reason = "Tauri transitive dep (gdk)" },
    { id = "RUSTSEC-2024-0413", reason = "Tauri transitive dep (atk)" },
    { id = "RUSTSEC-2024-0414", reason = "Tauri transitive dep (pango)" },
    { id = "RUSTSEC-2024-0415", reason = "Tauri transitive dep (glib)" },
    { id = "RUSTSEC-2024-0416", reason = "Tauri transitive dep (atk-sys)" },
    { id = "RUSTSEC-2024-0417", reason = "Tauri transitive dep (gio-sys)" },
    { id = "RUSTSEC-2024-0418", reason = "Tauri transitive dep (gdk-sys)" },
    { id = "RUSTSEC-2024-0419", reason = "Tauri transitive dep (gtk-sys)" },
    { id = "RUSTSEC-2024-0420", reason = "Tauri transitive dep (gtk)" },
    { id = "RUSTSEC-2025-0057", reason = "Tauri transitive dep (fxhash)" },
    { id = "RUSTSEC-2025-0075", reason = "Tauri transitive dep (gdk-pixbuf)" },
    { id = "RUSTSEC-2025-0080", reason = "Tauri transitive dep (cairo)" },
    { id = "RUSTSEC-2025-0081", reason = "Tauri transitive dep (pango-sys)" },
    { id = "RUSTSEC-2025-0098", reason = "Tauri transitive dep (gobject-sys)" },
    { id = "RUSTSEC-2025-0100", reason = "Tauri transitive dep (glib-sys)" },
    { id = "RUSTSEC-2026-0097", reason = "rand 0.8 unsoundness requires custom logger + thread_rng — we use neither" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "AGPL-3.0-or-later",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    # `clipboard-win` (transitive from tauri-plugin-clipboard-manager on
    # Windows) ships under Boost 1.0 — permissive, compatible with
    # AGPL/MIT/Apache-2.
    "BSL-1.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Workspace crates use path deps without version (expected)
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
