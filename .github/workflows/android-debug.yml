name: Android Debug Build

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  android-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;29.0.13846066"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build Android debug APK
        run: |
          cd app
          cargo tauri android build --apk --debug --target aarch64
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.13846066

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustok-android-debug
          path: app/src-tauri/gen/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
