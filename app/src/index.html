<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Rustok</title>

    <link data-trunk rel="copy-file" href="assets/anti-fouc.js" />
    <script src="anti-fouc.js"></script>
    <meta name="theme-color" content="#0A1123" />
    <style>
      :root {
        --rw-bg:          #0A1123;
        --rw-surface-1:   #141A33;
        --rw-surface-2:   #1C2244;
        --rw-border:      #242B4C;
        --rw-text:        #FFFFFF;
        --rw-card:        linear-gradient(160deg, #141A33 0%, #0D1328 100%);
        --rw-switch-off:  rgba(255, 255, 255, 0.14);
        --rw-tab-bg:      rgba(10, 17, 35, 0.92);
        --rw-neutral-mid: #959BB5;
      }
      :root[data-theme="light"] {
        --rw-bg:          #F6F7FB;
        --rw-surface-1:   #FFFFFF;
        --rw-surface-2:   #F0F1F8;
        --rw-border:      #E5E8F2;
        --rw-text:        #0A1123;
        --rw-card:        linear-gradient(160deg, #FFFFFF 0%, #F6F7FB 100%);
        --rw-switch-off:  rgba(0, 0, 0, 0.12);
        --rw-tab-bg:      rgba(246, 247, 251, 0.92);
        --rw-neutral-mid: #6B7088;
      }
    </style>

    <link data-trunk rel="css" href="styles/main.css" />
    <link data-trunk rel="copy-file" href="assets/logo.png" />
    <link data-trunk rel="copy-file" href="assets/rustok-logo-transparent.png" />
</head>

</html>
